name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/${GITHUB_REPOSITORY#*/}:${GITHUB_REF_NAME//\//-} .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${GITHUB_REPOSITORY#*/}:${GITHUB_REF_NAME//\//-}
